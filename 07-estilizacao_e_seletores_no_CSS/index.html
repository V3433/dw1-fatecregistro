        <p>este é um outro parágrafo</p>

    <!-- Seletor de CLASSE -->
     <p class="destaque">Este parágrafo está sendo estilizado pela classe "destaque"</p>

     <p class="destaque">Outro paragrafo estilizado com a mesma classe</p>

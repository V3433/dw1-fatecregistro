<!DOCTYPE html>
<html lang="ptbr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
    <h1> Cadastro de Aluno - DSM</h1>

    <p>Este formulário visa cadastrar o aluno no sistema da Fatec Registro-SP para organização de dados individuais e acadêmicos.</p>
        <!-- Cria o formulario -->
        <form action="#" method="post">
            <!-- Dados Pessoais -->
            <fieldset>
                <legend>Dados Pessoais</legend>
                <!-- Nome Completo -->
                 <label for="nome">Nome Completo</label> <br>
                <input type="text" name="nome" id="nome" required placeholder="Fulano da Silva Souza">
                <br>
                <!-- Email -->
                <label for="email">E-mail</label> <br>
                <input type="email" name="email" id="name" required placeholder="exemplo@email.com">
                <br>
                <!-- Data de Nascimento -->
                <label for="data">Data de Nascimento</label> <br>
                <input type="date" name="data" id="data" required>
            </fieldset>

            <!-- Dados Acadêmicos -->
            <fieldset>
                <legend>Dados Acadêmicos</legend>
                <!-- Curso -->
                 <label for="curso">Curso</label> <br>
                <select name="curso" id="curso">
                    <option value="dsm">DSM</option>
                    <option value="ads">ADS</option>
                    <option value="dsm">Outro</option>
                </select>
                <br>
                <!--Periodo-->
                <label for="periodo">Periodo</label> <br>
                <input type="radio" value="manha" name="periodo" id="periodo" required>Manhã
                <input type="radio" value="noite" name="periodo" id="periodo" required>Noite
                <br>
                <!-- Observações -->
                <textarea name="Observações" id="Obs" cols="40" rows="4">
                </textarea>
             </fieldset>

             <button type="submit">Enviar</button>
             <button type="reset">Reiniciar</button>
        </form>
    </body>
</html>
